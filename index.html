<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設営アシスト Ver3 - Professional</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css?v=1.0.1">
  
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <nav class="app-nav">
      <button type="button" onclick="switchApp('kinto')" id="btn-kinto" class="active">
        <span class="material-icons-round">view_column</span>均等割り
      </button>
      <button type="button" onclick="switchApp('bis')" id="btn-bis">
        <span class="material-icons-round">architecture</span>ビス位置
      </button>
      <button type="button" class="external coming-soon" disabled>
        <span class="material-icons-round">straighten</span>位置出し
      </button>
      <button type="button" class="external coming-soon" disabled>
        <span class="material-icons-round">layers</span>大作くん
      </button>
    </nav>

    <div id="app-kinto">
      <h2 class="section-title"><span class="material-icons-round">straighten</span> 均等割りくん</h2>
      
      <div class="card">
        <label><span class="material-icons-round">settings</span> 計算モード</label>
        <select id="calcMode">
          <option value="even">すべて均等</option>
          <option value="fixEdge">両端を指定 → 中を自動</option>
          <option value="fixGap">中の隙間を指定 → 両端を自動</option>
          <option value="fixLeft">左端のみ指定 → 残りを均等</option>
          <option value="fixRight">右端のみ指定 → 残りを均等</option>
        </select>
      </div>

      <div class="card">
        <label><span class="material-icons-round">width_full</span> 壁幅 (mm)</label>
        <input id="wallWidth" type="number" placeholder="例：5000" inputmode="decimal">
      </div>

      <div id="extraSettings" class="card" style="display:none; border-left: 4px solid var(--primary-color);">
        <div id="edgeInputGroup" style="display:none;">
          <label id="edgeLabel">余白 (mm)</label>
          <input id="edgeWidth" type="number" placeholder="例：500" inputmode="decimal">
        </div>
        <div id="gapInputGroup" style="display:none;">
          <label>作品同士の隙間 (mm)</label>
          <input id="midGapWidth" type="number" placeholder="例：200" inputmode="decimal">
        </div>
      </div>

      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
          <label style="margin-bottom: 0;"><span class="material-icons-round">photo</span> 作品幅 (mm)</label>
          <button type="button" class="btn-add" onclick="addArtwork()"><span class="material-icons-round">add</span>追加</button>
        </div>
        <div id="artworks"></div>
      </div>
      
      <div class="canvas-wrapper">
        <canvas id="canvas" width="350" height="130"></canvas>
      </div>

      <div class="card">
        <label><span class="material-icons-round">link</span> グループ内の隙間 (mm)</label>
        <input id="groupGapWidth" type="number" value="50" inputmode="decimal">
      </div>

      <div class="card slide-card">
        <label><span class="material-icons-round">unfold_more</span> 全体スライド調整 (mm)</label>
        <div class="slide-control">
          <input id="slideOffset" type="range" value="0" min="-100" max="100" step="1">
          <input id="slideOffsetText" type="number" value="0" class="slide-val-input">
        </div>
      </div>

      <div class="card">
        <label><span class="material-icons-round">list</span> 個別隙間の固定・修正</label>
        <div id="individualGaps"></div>
      </div>
    </div>

    <div id="app-bis" style="display:none;">
      <h2 class="section-title"><span class="material-icons-round">gps_fixed</span> ビス位置くん</h2>
      <div class="card base-setting">
        <label><span class="material-icons-round">horizontal_rule</span> センターライン (mm)</label>
        <input id="centerLine" type="number" value="1450" inputmode="decimal">
      </div>
      <div class="card">
        <label>１：作品縦サイズ (mm)</label>
        <input id="artHeight" type="number" placeholder="例: 600" oninput="calcBis()" inputmode="decimal">
        <div class="bis-grid">
          <div class="bis-item"><span>A:底面</span><strong id="res-A">-</strong></div>
          <div class="bis-item"><span>B:天面</span><strong id="res-B">-</strong></div>
        </div>
      </div>
      <div class="card">
        <label>２：天面からビスまで (mm)</label>
        <input id="bisFromTop" type="number" placeholder="例: 150" oninput="calcBis()" inputmode="decimal">
        <div class="bis-grid">
          <div class="bis-item"><span>C:CL対ビス</span><strong id="res-C">-</strong></div>
          <div class="bis-item"><span>D:床対ビス</span><strong id="res-D">-</strong></div>
        </div>
      </div>
      <div class="card">
        <label>３：作品横幅 (mm)</label>
        <input id="artWidth" type="number" placeholder="例: 400" oninput="calcBis()" inputmode="decimal">
        <select id="bisPreset" onchange="calcBis()">
          <option value="1:3:1">1:3:1 (標準)</option>
          <option value="2:3:2">2:3:2 (広め)</option>
          <option value="1:1">1:1 (中央1点)</option>
        </select>
        <div class="bis-grid highlight">
          <div class="bis-item"><span>E:端から穴</span><strong id="res-E">-</strong></div>
          <div class="bis-item"><span>F:穴〜穴</span><strong id="res-F">-</strong></div>
        </div>
      </div>
      <div class="canvas-wrapper">
        <canvas id="canvas-bis" width="350" height="400"></canvas>
      </div>
    </div>
  </div>

  <script src="app.js?v=1.0.1"></script>
</body>
</html>
