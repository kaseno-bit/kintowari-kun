<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設営アシスト Ver3</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <nav class="app-nav">
      <button type="button" onclick="switchApp('kinto')" id="btn-kinto" class="active">均等割り</button>
      <button type="button" onclick="switchApp('bis')" id="btn-bis">ビス位置くん</button>
      <button type="button" class="external coming-soon" disabled>位置出し(準備中)</button>
      <button type="button" class="external coming-soon" disabled>大作くん(準備中)</button>
    </nav>

    <div id="app-kinto">
      <h1>均等割りくん Ver2</h1>
      <div class="card">
        <label>計算モード</label>
        <select id="calcMode">
          <option value="even">すべて均等</option>
          <option value="fixEdge">両端を指定 → 中を自動</option>
          <option value="fixGap">中の隙間を指定 → 両端を自動</option>
          <option value="fixLeft">左端のみ指定 → 残りを均等</option>
          <option value="fixRight">右端のみ指定 → 残りを均等</option>
        </select>
      </div>
      <div class="card">
        <label>壁幅 (mm)</label>
        <input id="wallWidth" type="number" placeholder="例：5000" inputmode="decimal">
      </div>
      <div id="extraSettings" class="card" style="display:none;">
        <div id="edgeInputGroup" style="display:none;">
          <label id="edgeLabel">余白 (mm)</label>
          <input id="edgeWidth" type="number" placeholder="例：500" inputmode="decimal">
        </div>
        <div id="gapInputGroup" style="display:none;">
          <label>作品同士の隙間 (mm)</label>
          <input id="midGapWidth" type="number" placeholder="例：200" inputmode="decimal">
        </div>
      </div>
      <div class="card">
        <div class="header"><label>作品幅 (mm)</label><button type="button" onclick="addArtwork()">＋追加</button></div>
        <div id="artworks"></div>
      </div>
      <canvas id="canvas" width="350" height="130"></canvas>
      <div class="card group-setting">
        <label>グループ内の隙間 (mm)</label>
        <input id="groupGapWidth" type="number" value="50" inputmode="decimal">
      </div>
      <div class="card slide-card">
        <label>◀全体スライド調整 (mm)▶</label>
        <div class="slide-control">
          <input id="slideOffset" type="range" value="0" min="-100" max="100" step="1">
          <input id="slideOffsetText" type="number" value="0" class="slide-val-input">
        </div>
      </div>
      <div class="card"><label>個別隙間の固定</label><div id="individualGaps"></div></div>
    </div>

    <div id="app-bis" style="display:none;">
      <h1>ビス位置くん</h1>
      <div class="card base-setting">
        <label>センターライン（レーザー高） (mm)</label>
        <input id="centerLine" type="number" value="1450" inputmode="decimal" oninput="calcBis()">
      </div>
      <div class="card">
        <label>１：作品縦サイズ (mm)</label>
        <input id="artHeight" type="number" placeholder="例: 600" oninput="calcBis()" inputmode="decimal">
        <div class="bis-sub-result">
          <p>A：床から作品底面：<strong id="res-A">-</strong> mm</p>
          <p>B：床から作品天面：<strong id="res-B">-</strong> mm</p>
        </div>
      </div>
      <div class="card">
        <label>２：ビス/ドッコまでの距離（天面から） (mm)</label>
        <input id="bisFromTop" type="number" placeholder="例: 150" oninput="calcBis()" inputmode="decimal">
        <div class="bis-sub-result">
          <p>C：センターからビス：<strong id="res-C">-</strong> mm</p>
          <p>D：床からビス高さ：<strong id="res-D">-</strong> mm</p>
        </div>
      </div>
      <div class="card">
        <label>３：作品横幅 (mm)</label>
        <input id="artWidth" type="number" placeholder="例: 400" oninput="calcBis()" inputmode="decimal">
        <label>ビスピッチ・プリセット</label>
        <select id="bisPreset" onchange="calcBis()">
          <option value="1:3:1">1 : 3 : 1 (安定)</option>
          <option value="2:3:2">2 : 3 : 2 (広め)</option>
          <option value="1:1">1 : 1 (中央1点)</option>
        </select>
        <div class="bis-sub-result highlight">
          <p>E：端からビス穴まで：<strong id="res-E">-</strong> mm</p>
          <p>F：ビス穴同士の距離：<strong id="res-F">-</strong> mm</p>
        </div>
      </div>
      <canvas id="canvas-bis" width="350" height="400"></canvas>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
