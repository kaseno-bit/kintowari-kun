<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>均等割りくん Ver2</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <h1>均等割りくん Ver2</h1>

    <div class="card">
      <label>計算モード</label>
      <select id="calcMode">
        <option value="even">すべて均等</option>
        <option value="fixEdge">両端を指定 → 中を自動</option>
        <option value="fixGap">中の隙間を指定 → 両端を自動</option>
        <option value="fixLeft">左端のみ指定 → 残りを均等</option>
        <option value="fixRight">右端のみ指定 → 残りを均等</option>
      </select>
    </div>

    <div class="card">
      <label>壁幅 (mm)</label>
      <input id="wallWidth" type="number" placeholder="例：5000" inputmode="decimal">
    </div>

    <div id="extraSettings" class="card" style="display:none;">
      <div id="edgeInputGroup" style="display:none;">
        <label id="edgeLabel">余白 (mm)</label>
        <input id="edgeWidth" type="number" placeholder="例：500" inputmode="decimal">
      </div>
      <div id="gapInputGroup" style="display:none;">
        <label>作品同士の隙間 (mm)</label>
        <input id="midGapWidth" type="number" placeholder="例：200" inputmode="decimal">
      </div>
    </div>

    <div class="card">
      <div class="header">
        <label>作品幅 (mm)</label>
        <button type="button" onclick="addArtwork()">＋追加</button>
      </div>
      <div id="artworks"></div>
    </div>

    <div class="card group-setting">
      <label>グループ内の隙間 (mm)</label>
      <input id="groupGapWidth" type="number" value="50" inputmode="decimal">
      <small>※「連」にチェックした作品同士の隙間です</small>
    </div>

    <div class="result">
      <div id="error" class="error"></div>
      <div id="gap" class="gap"></div>
    </div>

    <canvas id="canvas" width="350" height="130"></canvas>

    <div class="card slide-card">
      <label>◀全体スライド調整 (mm)▶</label>
      <div class="slide-control">
        <input id="slideOffset" type="range" value="0" min="-100" max="100" step="1">
        <input id="slideOffsetText" type="number" value="0" inputmode="numbers" class="slide-val-input">
      </div>
    </div>

    <div class="card">
      <label>個別隙間の固定・修正</label>
      <div id="individualGaps"></div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
