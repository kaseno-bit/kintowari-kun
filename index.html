<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>均等割りくん</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

  <div class="container">
    <h1>均等割りくん</h1>

    <div class="card">
      <label>壁幅</label>
      <input id="wallWidth" type="number" placeholder="例：5000">
    </div>

    <div class="card">
      <div class="header">
        <label>作品幅</label>
        <button onclick="addArtwork()">＋追加</button>
      </div>
      <div id="artworks"></div>
    </div>

    <div class="result">
      <div id="error" class="error"></div>
      <div id="gap" class="gap"></div>
    </div>

    <canvas id="canvas" width="350" height="120"></canvas>

  </div>

  <script src="app.js"></script>
</body>
</html>
